name: File operations in github

on: workflow_dispatch

jobs:
    files:
        runs-on: ubuntu-latest
        steps:
            - name: create a one file
              run: echo "HELLO YO YO" > devops4.txt
            
            - name: display the content of a file
              run: cat devops4.txt

            - name: display the date
              run: date

            - name: display files and directories
              run: ls -lrtha
            
            - name: display th present location
              run: pwd